# ============================================================
#  AdSync — Docker Compose
#  Run: docker-compose up --build
# ============================================================

services:
  # ---------- Backend (Node + Playwright) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adsync-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- Frontend (Nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adsync-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
